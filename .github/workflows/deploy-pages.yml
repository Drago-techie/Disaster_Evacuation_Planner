name: Deploy WebAssembly Preview to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.50'

      - name: Configure CMake for WebAssembly
        run: |
          emcmake cmake -B build-web -DEMSCRIPTEN=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build WebAssembly Project
        run: |
          cmake --build build-web --config Release

      - name: Prepare Web Root Assets
        run: |
          mv build-web/DisasterEvacPlanner.html build-web/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build-web
          force_orphan: true
