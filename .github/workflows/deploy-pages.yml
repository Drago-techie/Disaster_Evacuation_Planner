name: Deploy WebAssembly Preview to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.50'

      - name: Configure CMake for WebAssembly
        run: |
          emcmake cmake -B build-web -DEMSCRIPTEN=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build WebAssembly Project
        run: |
          cmake --build build-web --config Release

      - name: Rename HTML Output for Root Access
        run: |
          mv build-web/DisasterEvacPlanner.html build-web/index.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build-web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
